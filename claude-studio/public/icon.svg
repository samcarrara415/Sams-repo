<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b222e"/>
      <stop offset="1" stop-color="#0b0f16"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8926f"/>
      <stop offset="1" stop-color="#d97757"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background (safe for maskable icons) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Brand diamond (rounded square rotated 45°) -->
  <rect x="156" y="156" width="200" height="200" rx="34"
        transform="rotate(45 256 256)" fill="url(#diamond)"/>

  <!-- ">_" terminal prompt: signals a code IDE -->
  <polyline points="226,222 256,256 226,290" fill="none" stroke="#fff"
            stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="270" y1="292" x2="300" y2="292" stroke="#fff"
        stroke-width="18" stroke-linecap="round"/>
</svg>
