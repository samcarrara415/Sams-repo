<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>C++ Playground</title>
  <meta name="description" content="Write C++ and run it in your browser — output prints to the terminal. No setup, works offline, installable." />

  <!-- PWA / installable -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#161b22" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
  <link rel="apple-touch-icon" href="./icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="C++ Playground" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">◆ C++ Playground</div>
    <div class="spacer"></div>
    <button id="btn-reset" class="btn btn-ghost" title="Reset to the starter program">Reset</button>
    <button id="btn-run" class="btn btn-run" title="Run (Ctrl/Cmd + Enter)">▶ Run</button>
  </header>

  <main class="workspace">
    <section class="editor-pane">
      <div id="editor" class="editor"></div>
    </section>

    <section class="terminal-pane">
      <div class="term-head">
        <span>Terminal</span>
        <div class="spacer"></div>
        <button id="btn-clear" class="btn btn-ghost btn-sm">Clear</button>
      </div>
      <pre id="output" class="term-out"><span class="dim">Press ▶ Run to compile &amp; run. Output appears here.</span></pre>
      <div class="stdin-row">
        <span class="stdin-label">stdin</span>
        <input id="stdin" class="stdin-input" placeholder="input for cin (optional)" autocomplete="off" spellcheck="false" />
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>
  <script src="./vendor/JSCPP.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
