<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>C++ Playground</title>
  <meta name="description" content="Write C++ and run it on a real gcc compiler from your browser. Output prints to the terminal. Installable." />

  <!-- PWA / installable -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#161b22" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
  <link rel="apple-touch-icon" href="./icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="C++ Playground" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <div id="menu-backdrop" class="menu-backdrop hidden"></div>

  <header class="topbar">
    <div class="file-wrap">
      <button id="btn-file" class="icon-btn" title="File">
        <span class="brand-mark">◆</span>
        <span class="caret">⌄</span>
      </button>
      <div id="file-menu" class="menu hidden">
        <button data-act="new">＋ New file</button>
        <button data-act="open">↥ Open from Files…</button>
        <button data-act="save">↧ Save to Files…</button>
      </div>
    </div>
    <button id="filename" class="filename" title="Tap to rename">main.cpp</button>
    <div class="spacer"></div>
    <label class="std-select">
      <select id="std" title="C++ standard">
        <option value="c++17">C++17</option>
        <option value="c++2a" selected>C++20</option>
        <option value="gnu++2b">C++23</option>
      </select>
    </label>
    <button id="btn-run" class="btn btn-run" title="Run (Ctrl/Cmd + Enter)">
      <span class="run-icon">▶</span><span class="run-label">Run</span>
      <span class="spinner" aria-hidden="true"></span>
    </button>
    <input id="file-input" type="file" accept=".cpp,.cc,.cxx,.c,.h,.hpp,.hh,.ino,text/plain" hidden />
  </header>

  <main class="workspace">
    <section class="editor-pane">
      <div id="editor" class="editor"></div>
    </section>

    <div class="divider" role="separator"></div>

    <section class="terminal-pane">
      <div class="term-head">
        <span class="status-dot" id="status-dot"></span>
        <span class="term-title" id="term-status">Ready</span>
        <div class="spacer"></div>
        <span class="term-env" id="term-env">gcc 13.2 · C++20</span>
        <button id="btn-clear" class="btn btn-ghost btn-sm">Clear</button>
      </div>
      <pre id="output" class="term-out"><span class="dim">Press <b>▶ Run</b> to compile &amp; run on a real gcc compiler. Output appears here.</span></pre>
      <div class="stdin-row">
        <span class="stdin-label">stdin</span>
        <input id="stdin" class="stdin-input" placeholder="input for cin (optional)" autocomplete="off" spellcheck="false" />
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>
  <script src="./app.js"></script>
</body>
</html>
